<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Student Grade Predictor</title>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>

<body>
    <main class="container">
        <h1 class="logo">Student Grade Predictor</h1>

        <div class="grid">
            <section class="panel form-panel">
                <h2>Enter Student Details</h2>
                <p class="muted">Fill the fields below — you can preview and edit before predicting.</p>
                <form id="studentForm">
                    <div class="row">
                        <label>Age<input name="age" type="number" min="10" max="100" value="18" /></label>
                        <label>Sex
                            <select name="sex">
                                <option value="F">F</option>
                                <option value="M">M</option>
                            </select>
                        </label>
                    </div>

                    <div class="row">
                        <label>Study time
                            <select name="studytime">
                                <option value="1">&lt;2 hrs</option>
                                <option value="2">2-5 hrs</option>
                                <option value="3">5-10 hrs</option>
                                <option value="4">&gt;10 hrs</option>
                            </select>
                        </label>
                        <label>Failures<input name="failures" type="number" min="0" max="10" value="0" /></label>
                    </div>

                    <div class="row">
                        <label>Family relationship <input name="famrel" type="number" min="1" max="5"
                                value="4" /></label>
                        <label>Free time <input name="freetime" type="number" min="1" max="5" value="3" /></label>
                    </div>

                    <div class="row">
                        <label>Going out <input name="goout" type="number" min="1" max="5" value="3" /></label>
                        <label>Health <input name="health" type="number" min="1" max="5" value="3" /></label>
                    </div>

                    <div class="row">
                        <label>Absences <input name="absences" type="number" min="0" max="100" value="4" /></label>
                        <label>G1 <input name="G1" type="number" min="0" max="20" value="10" /></label>
                    </div>

                    <div class="row">
                        <label>G2 <input name="G2" type="number" min="0" max="20" value="11" /></label>
                        <label>Traveltime
                            <select name="traveltime">
                                <option value="1">&lt;15</option>
                                <option value="2">15-30</option>
                                <option value="3">30-60</option>
                                <option value="4">&gt;60</option>
                            </select>
                        </label>
                    </div>

                    <div class="row switches">
                        <label><input type="checkbox" name="activities" /> Activities</label>
                        <label><input type="checkbox" name="paid" /> Paid classes</label>
                        <label><input type="checkbox" name="higher" checked /> Wants higher</label>
                        <label><input type="checkbox" name="internet" checked /> Internet</label>
                    </div>

                    <div class="actions">
                        <button id="formPredict" class="btn">Predict Student</button>
                        <button id="formReset" type="button" class="btn secondary">Reset</button>
                    </div>
                </form>

                <div class="or-line"><span>or</span></div>

                <div class="uploader compact">
                    <label class="dropzone small" id="dropzone">
                        <input id="file" type="file" accept=".csv" hidden />
                        <div class="drop-content">
                            <svg class="cloud" viewBox="0 0 24 24">
                                <path d="M19 18H6a4 4 0 010-8 5 5 0 019.9-1.7A3.5 3.5 0 0119 18z" />
                            </svg>
                            <p>Upload CSV</p>
                        </div>
                    </label>
                    <button id="predictBtn" class="btn">Predict CSV</button>
                </div>
            </section>

            <aside class="panel result-panel">
                <div class="avatar-wrap">
                    <svg class="avatar" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="g" x1="0" x2="1">
                                <stop offset="0" stop-color="#7c3aed" />
                                <stop offset="1" stop-color="#22d3ee" />
                            </linearGradient>
                        </defs>
                        <circle cx="60" cy="60" r="40" fill="url(#g)" opacity="0.14" />
                        <g transform="translate(30,30)">
                            <circle cx="30" cy="20" r="14" fill="#fff" opacity="0.9" />
                            <rect x="6" y="48" width="48" height="20" rx="8" fill="#fff" opacity="0.9" />
                        </g>
                    </svg>
                </div>

                <div class="card result-card">
                    <h3>Predicted Final Grade</h3>
                    <div class="gauge">
                        <svg viewBox="0 0 120 120">
                            <circle class="g-bg" cx="60" cy="60" r="50" />
                            <circle class="g-fg" cx="60" cy="60" r="50" stroke-dasharray="314"
                                stroke-dashoffset="314" />
                            <text x="60" y="68" text-anchor="middle" class="g-text">—</text>
                        </svg>
                    </div>

                    <div class="meta">
                        <p id="note" class="note">Fill details and click <strong>Predict Student</strong>.</p>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
</body>

</html>
